name: stats

on: 
  push: 
    branches: [ main ]

jobs:
    build:
      runs-on: ubuntu-latest

      permissions: 
       contents: write

      steps:
        - name: Checkout repo
          uses: actions/checkout@v6

        - name: Setup Python
          uses: actions/checkout@v6
          with:
            python-version: '3.13'

        - name: Run script
          run: python ./stats.py

        - name: Commit and Push Changes
          uses: stefanzweifel/git-auto-commit-action@v7
          with:
            commit_message: Update stats
            
      
